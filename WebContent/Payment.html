<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secure Payment</title>

<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    font-family: 'Segoe UI', sans-serif;
}

.payment-card {
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

.card-icons img {
    width: 60px;
    margin-right: 10px;
}

.header-title {
    text-align: center;
    color: white;
    margin: 30px 0;
}

.btn-success {
    background-color: #28a745;
    font-weight: bold;
}
</style>
</head>

<body>

<h2 class="header-title">💳 Secure Payment Gateway</h2>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card payment-card">
                <div class="card-body">

                    <!-- Card Icons -->
                    <div class="text-center mb-3 card-icons">
                        <img src="https://img.icons8.com/color/48/visa.png"/>
                        <img src="https://img.icons8.com/color/48/mastercard.png"/>
                        <img src="https://img.icons8.com/color/48/paypal.png"/>
                    </div>

                    <form action="booktrains" method="post">

                        <!-- Card Number -->
                        <div class="mb-3">
                            <label class="form-label">Card Number</label>
                            <input type="text" name="cardNumber"
                                   class="form-control"
                                   placeholder="1234 5678 9012 3456"
                                   maxlength="16"
                                   pattern="[0-9]{16}"
                                   required>
                        </div>

                        <!-- Expiry + CVV -->
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Expiry Date</label>
                                <input type="month" name="expiry" class="form-control" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">CVV</label>
                                <input type="password" name="cvv"
                                       class="form-control"
                                       maxlength="3"
                                       pattern="[0-9]{3}"
                                       required>
                            </div>
                        </div>

                        <!-- Card Owner -->
                        <div class="mb-3">
                            <label class="form-label">Card Holder Name</label>
                            <input type="text" name="cardOwner"
                                   class="form-control"
                                   placeholder="Full Name"
                                   required>
                        </div>

                        <!-- Info -->
                        <div class="alert alert-info">
                            🔒 Your payment is secure and encrypted.
                        </div>

                        <!-- Submit -->
                        <button type="submit" class="btn btn-success w-100">
                            Confirm Payment
                        </button>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
