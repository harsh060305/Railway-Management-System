<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NexRail</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo">🚄 NexRail</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="register.html" class="btn">Register</a>
        </div>
    </nav>

    <div class="card">
        <h2>Welcome Back</h2>
        <form id="loginForm">
            <div class="form-group">
                <label>Email ID</label>
                <input type="email" id="email" class="form-control" required placeholder="john@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" class="form-control" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn" style="width: 100%;">Login to Account</button>
        </form>
        <p class="text-center mt-2" style="font-size: 0.9rem; color: var(--text-secondary);">
            Don't have an account? <a href="register.html" style="color: var(--primary);">Register here</a>
        </p>
    </div>

    <script src="app.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Allow admin login shortcut setup
            if(email === 'admin@railway.com' && password === 'admin123') {
                setUser({ id: 1, email: email, role: 'ADMIN', fullName: 'System Admin' });
                window.location.href = 'admin-dashboard.html';
                return;
            }

            const res = await fetchApi('/auth/login', 'POST', { email, password });
            if(res.success) {
                setUser(res.data);
                window.location.href = 'user-dashboard.html';
            } else {
                showAlert(res.message, true);
            }
        });
    </script>
</body>
</html>
